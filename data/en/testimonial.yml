  testimonial_item :
    - name : "Karen Mitchell"
      image : "images/client/client-1.jpg"
      image_webp : "images/client/client-1.webp"
      date : "Bethesda, MD"
      content : "We had a list of about fifteen small things that needed fixing before we put our house on the market. Loose cabinet handles, a cracked tile in the bathroom, nail holes everywhere. He knocked out the entire list in one day and our realtor said the place looked move-in ready. Wish we had called months earlier."

    - name : "Tom Brennan"
      image : "images/client/client-2.jpg"
      image_webp : "images/client/client-2.webp"
      date : "Silver Spring, MD"
      content : "I spent two weekends trying to fix a drywall crack that kept coming back. He came out, found that the seam tape had failed behind the surface, repaired it properly, and matched the existing texture perfectly. You cannot even tell there was damage. That is the difference between guessing and actually knowing what you are doing."

    - name : "Susan and Dave Marchetti"
      image : "images/client/client-1.jpg"
      image_webp : "images/client/client-1.webp"
      date : "Arlington, VA"
      content : "We bought a 1940s colonial and the previous owners left us a long list of problems. He has been our go-to handyman for over a year now. Every time he comes out, he is on time, he explains what he is doing, and he leaves the place cleaner than he found it. We finally found someone we actually trust to work in our home."

    - name : "Rachel Novak"
      image : "images/client/client-2.jpg"
      image_webp : "images/client/client-2.webp"
      date : "Washington, DC"
      content : "I manage three rental properties and turnover repairs used to be a nightmare. Patching walls, adjusting doors, replacing fixtures between tenants. Now I make one call and everything gets handled within a few days. My units rent faster because they actually look well-maintained. He has saved me a lot of time and stress."

    - name : "Jim Kowalski"
      image : "images/client/client-1.jpg"
      image_webp : "images/client/client-1.webp"
      date : "Rockville, MD"
      content : "I needed three ceiling fans and a bathroom faucet installed. Called two other guys first and neither one ever called me back. He responded the same day, came out that week, and did clean professional work on all four. Fair price, showed up when he said he would. That is all I wanted and it was surprisingly hard to find until now."
